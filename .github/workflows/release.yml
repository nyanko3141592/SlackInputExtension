name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate icons
        run: pnpm build:icons

      - name: Build extension ZIP
        run: pnpm build:zip

      - name: Verify ZIP exists
        run: |
          ls -la dist/
          file dist/*.zip

      - name: Extract version from manifest
        id: version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip=slack-ai-rewriter-v${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          name: 'v${{ steps.version.outputs.version }}'
          generate_release_notes: true
          files: |
            dist/${{ steps.version.outputs.zip }}
          body: |
            ## インストール

            1. 下の `slack-ai-rewriter-v${{ steps.version.outputs.version }}.zip` をダウンロードして解凍
            2. Chrome の `chrome://extensions/` を開く → デベロッパーモード ON
            3. 「パッケージ化されていない拡張機能を読み込む」 → 解凍したフォルダを選択
            4. 拡張機能アイコンから Gemini API キーを設定

            ## Web Store

            審査が完了するまでは ZIP を手動インストールしてご利用ください。

            ---
