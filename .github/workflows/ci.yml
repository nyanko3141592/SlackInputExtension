name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Prettier check
        run: pnpm format:check

  validate:
    name: Validate manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Validate manifest.json
        run: |
          node -e "
            const m = JSON.parse(require('fs').readFileSync('manifest.json'));
            if (m.manifest_version !== 3) throw new Error('manifest_version must be 3');
            if (!m.version || !/^\d+\.\d+\.\d+$/.test(m.version)) throw new Error('version must be x.y.z');
            if (!m.name || !m.description) throw new Error('name/description required');
            console.log('✓ manifest valid:', m.name, 'v' + m.version);
          "

      - name: Check icons exist (or generate)
        run: |
          for s in 16 48 128; do
            if [ ! -f "icons/icon${s}.png" ]; then
              echo "::warning::icons/icon${s}.png missing - will be generated"
            fi
          done

  build:
    name: Build ZIP
    needs: [lint, validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate icons
        run: pnpm build:icons

      - name: Build extension ZIP
        run: pnpm build:zip

      - name: Check ZIP size (warn if > 5 MB)
        run: |
          size=$(stat -c%s dist/*.zip)
          mb=$(awk -v s="$size" 'BEGIN{ printf "%.2f", s/1024/1024 }')
          echo "ZIP size: ${mb} MB"
          if [ "$size" -gt 5242880 ]; then
            echo "::warning::ZIP exceeds 5 MB (${mb} MB) — Chrome Web Store allows up to 50 MB but smaller is better"
          fi

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v5
        with:
          name: slack-ai-rewriter-zip-${{ github.sha }}
          path: dist/*.zip
          retention-days: 14

  version-bump-check:
    name: Version bump check (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect if source code changed
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '^(background\.js|content\.js|content\.css|popup\.(html|js|css)|manifest\.json)$' > /dev/null; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "src_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check version bump in manifest
        if: steps.changes.outputs.src_changed == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          base_ver=$(git show "$BASE_SHA:manifest.json" | node -e "console.log(JSON.parse(require('fs').readFileSync('/dev/stdin')).version)")
          head_ver=$(git show "$HEAD_SHA:manifest.json" | node -e "console.log(JSON.parse(require('fs').readFileSync('/dev/stdin')).version)")
          echo "base version: $base_ver"
          echo "head version: $head_ver"
          if [ "$base_ver" = "$head_ver" ]; then
            echo "::warning::ソースコードが変更されていますが manifest.json の version が bump されていません。リリース予定なら version を上げてください ($base_ver → 次)"
          else
            echo "✓ version bumped: $base_ver → $head_ver"
          fi
